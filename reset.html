<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Access | Reset Password</title>
  </head>
  <body>
    <div class="container">
      <div class="login__container">
        <div class="top__content">
          <p>Back to safety?</p>
          <button onclick="window.location.href='index.html'">Login</button>
          <h1>RESET</h1>
        </div>
        <div class="bottom__content">
          <form action="#" onsubmit="event.preventDefault(); showSuccess();">
            <div class="form__group">
              <span>
                <i class="ri-lock-line"></i>
              </span>
              <input type="password" placeholder="New Password" required />
            </div>
            <div class="form__group">
              <span>
                <i class="ri-lock-check-line"></i>
              </span>
              <input type="password" placeholder="Confirm New Password" required />
            </div>
            <button type="submit">UPDATE</button>
          </form>
        </div>
      </div>
    </div>

    <div id="success-msg" class="success-message">
      <i class="ri-checkbox-circle-line"></i>
      <span>Password reset successfully!</span>
    </div>

    <script>
      function showSuccess() {
        const msg = document.getElementById('success-msg');
        msg.classList.add('show');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      }
    </script>
  </body>
</html>
