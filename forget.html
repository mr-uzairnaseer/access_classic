<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Access | Forgot Password</title>
  </head>
  <body>
    <div class="container">
      <div class="login__container">
        <div class="top__content">
          <p>Remember your password?</p>
          <button onclick="window.location.href='index.html'">Login</button>
          <h1>RECOVERY</h1>
        </div>
        <div class="bottom__content">
          <form action="#" onsubmit="event.preventDefault(); alert('Reset link sent to your email!'); window.location.href='reset.html';">
            <p style="color: var(--primary-color-dark); margin-bottom: 1rem;">Enter your email to receive a password reset link.</p>
            <div class="form__group">
              <span>
                <i class="ri-mail-line"></i>
              </span>
              <input type="email" placeholder="Email Address" required />
            </div>
            <button type="submit">SEND LINK</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
